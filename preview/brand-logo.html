<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--bg-base);box-sizing:border-box;color:var(--fg-1);display:flex}
  .pane{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px 0}
  .light{background:#FFFFFF}
  .dark{background:#070808}
  .pane img{height:34px;display:block}
  .cap{font-family:var(--font-mono);font-size:10px}
  .light .cap{color:#8E8E92}
  .dark .cap{color:#8E8E92}
  .div{width:1px;background:var(--border-primary)}
</style></head>
<body>
  <div class="pane light">
    <img src="../assets/logo-dark.svg" alt="OBE logo">
    <div class="cap">logo-dark.svg · on light</div>
  </div>
  <div class="div"></div>
  <div class="pane dark">
    <img src="../assets/logo-light.svg" alt="OBE logo">
    <div class="cap">logo-light.svg · on dark</div>
  </div>
</body></html>
