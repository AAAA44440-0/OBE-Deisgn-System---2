<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--bg-base);padding:20px;box-sizing:border-box}
  .row{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px solid var(--divider-1)}
  .row:last-child{border-bottom:0}
  .sample{flex:1}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
</style></head>
<body>
  <div class="row"><div class="sample" style="color:#000000;font-weight:600">Aa Primary text</div><div class="meta">--fg-1 · #000000</div></div>
  <div class="row"><div class="sample" style="color:#57585C;font-weight:500">Aa Secondary text</div><div class="meta">--fg-2 · #57585C</div></div>
  <div class="row"><div class="sample" style="color:#8E8E92">Aa Tertiary text</div><div class="meta">--fg-3 · #8E8E92</div></div>
  <div class="row"><div class="sample" style="color:#C3C3C7">Aa Quaternary text</div><div class="meta">--fg-4 · #C3C3C7</div></div>
  <div class="row"><div class="sample" style="color:#F59505;font-weight:600">Aa Brand text</div><div class="meta">--fg-brand · #F59505</div></div>
</body></html>
