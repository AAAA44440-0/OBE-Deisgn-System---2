<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--bg-base);padding:22px;box-sizing:border-box;color:var(--fg-1)}
  .scale{display:flex;align-items:flex-end;gap:10px}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:#F59505;border-radius:4px;width:34px}
  .v{font-family:var(--font-mono);font-size:9px;color:var(--fg-3)}
</style></head>
<body>
  <div class="scale">
    <div class="item"><div class="bar" style="height:4px"></div><div class="v">4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="v">8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="v">12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="v">16</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="v">20</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="v">24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="v">32</div></div>
    <div class="item"><div class="bar" style="height:40px"></div><div class="v">40</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="v">48</div></div>
  </div>
  <div class="v" style="margin-top:14px">2-based scale · 16px = default gutter / card padding</div>
</body></html>
