<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--bg-base);padding:20px;box-sizing:border-box}
  .row{display:flex;gap:6px}
  .sw{flex:1;border-radius:8px;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;box-sizing:border-box;border:1px solid var(--border-primary)}
  .sw .n{font-size:11px;font-weight:600;font-family:var(--font-num)}
  .sw .h{font-size:9px;opacity:.7;font-family:var(--font-mono)}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#FFFFFF;color:#070808"><span class="n">1</span><span class="h">#FFFFFF</span></div>
    <div class="sw" style="background:#F7F7FA;color:#070808"><span class="n">2</span><span class="h">#F7F7FA</span></div>
    <div class="sw" style="background:#EAEAED;color:#070808"><span class="n">3</span><span class="h">#EAEAED</span></div>
    <div class="sw" style="background:#DEDFE0;color:#070808"><span class="n">4</span><span class="h">#DEDFE0</span></div>
    <div class="sw" style="background:#8E8E92;color:#fff"><span class="n">6</span><span class="h">#8E8E92</span></div>
    <div class="sw" style="background:#57585C;color:#fff"><span class="n">7</span><span class="h">#57585C</span></div>
    <div class="sw" style="background:#38393D;color:#fff"><span class="n">8</span><span class="h">#38393D</span></div>
    <div class="sw" style="background:#18191B;color:#fff"><span class="n">9</span><span class="h">#18191B</span></div>
    <div class="sw" style="background:#131516;color:#fff"><span class="n">10</span><span class="h">#131516</span></div>
    <div class="sw" style="background:#070808;color:#fff"><span class="n">11</span><span class="h">#070808</span></div>
  </div>
</body></html>
