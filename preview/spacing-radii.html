<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--bg-base);padding:22px;box-sizing:border-box;color:var(--fg-1)}
  .row{display:flex;gap:14px;align-items:center}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:74px;height:64px;background:#F7F7FA;border:1px solid var(--border-secondary)}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="v">xs · 4</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="v">sm · 8</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="v">md · 12</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="v">lg · 16</div></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><div class="v">xl · 24</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="v">pill</div></div>
  </div>
  <div class="v" style="margin-top:14px">Inferred — kit ships no radius tokens. Chips/inputs 8 · cards 12 · sheets 16–24.</div>
</body></html>
