<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--bg-base);padding:20px;box-sizing:border-box}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .blk{border-radius:10px;padding:12px}
  .t{font-size:13px;font-weight:600}
  .d{font-size:11px;font-family:var(--font-mono);margin-top:6px;opacity:.8}
</style></head>
<body>
  <div class="grid">
    <div class="blk" style="background:#EAF9EB;color:#00AB6C;border:1px solid #00AB6C22"><div class="t">Success</div><div class="d">fg #00AB6C<br>bg #EAF9EB</div></div>
    <div class="blk" style="background:#FFF7EB;color:#F59505;border:1px solid #F5950522"><div class="t">Warning</div><div class="d">fg #F59505<br>bg #FFF7EB</div></div>
    <div class="blk" style="background:#FEEEED;color:#ED4178;border:1px solid #ED417822"><div class="t">Danger</div><div class="d">fg #ED4178<br>bg #FEEEED</div></div>
  </div>
</body></html>
