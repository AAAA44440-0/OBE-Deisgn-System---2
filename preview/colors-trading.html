<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--bg-base);padding:20px;box-sizing:border-box}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .blk{border-radius:12px;padding:14px;color:#fff}
  .lab{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;opacity:.85}
  .big{font-family:var(--font-num);font-weight:600;font-size:22px;margin-top:6px}
  .sub{display:flex;gap:6px;margin-top:10px}
  .chip{font-family:var(--font-mono);font-size:9px;padding:3px 6px;border-radius:5px;background:rgba(255,255,255,.18)}
</style></head>
<body>
  <div class="grid">
    <div class="blk" style="background:#00AB6C">
      <div class="lab">Buy · Long · Up</div>
      <div class="big">+2.34%</div>
      <div class="sub"><span class="chip">#00AB6C</span><span class="chip">press #05903C</span></div>
    </div>
    <div class="blk" style="background:#ED4178">
      <div class="lab">Sell · Short · Down</div>
      <div class="big">−1.18%</div>
      <div class="sub"><span class="chip">#ED4178</span><span class="chip">press #CA2458</span></div>
    </div>
  </div>
</body></html>
