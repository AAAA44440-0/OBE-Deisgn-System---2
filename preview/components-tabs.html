<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--bg-base);padding:22px;box-sizing:border-box;color:var(--fg-1)}
  .seg{display:inline-flex;background:var(--fill-2);border-radius:10px;padding:3px;margin-bottom:16px}
  .seg button{border:0;background:transparent;font-family:var(--font-ui);font-weight:600;font-size:14px;color:var(--fg-2);padding:8px 18px;border-radius:8px;cursor:pointer}
  .seg button.on{background:var(--bg-base);color:var(--fg-1);box-shadow:var(--shadow-sm)}
  .tabs{display:flex;gap:22px;border-bottom:1px solid var(--divider-2)}
  .tabs a{font-weight:600;font-size:15px;color:var(--fg-3);padding:0 0 12px;position:relative;text-decoration:none}
  .tabs a.on{color:var(--fg-1)}
  .tabs a.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--fg-1);border-radius:2px}
</style></head>
<body>
  <div class="seg">
    <button class="on">Spot</button>
    <button>Futures</button>
    <button>Options</button>
  </div>
  <div class="tabs">
    <a class="on">Markets</a>
    <a>Favorites</a>
    <a>Gainers</a>
    <a>New</a>
  </div>
</body></html>
