<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--bg-base);padding:22px;box-sizing:border-box}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .tag{font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px}
  .pill{border-radius:999px}
  .dot{display:inline-flex;align-items:center;gap:6px}
  .dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .lime{background:#8CFA2B;color:#1b3c00}
  .num{background:#ED4178;color:#fff;border-radius:999px;min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-num);font-size:11px;font-weight:600;padding:0 5px}
</style></head>
<body>
  <div class="row">
    <span class="tag" style="background:#EAF9EB;color:#00AB6C">Open</span>
    <span class="tag" style="background:#FFF7EB;color:#F59505">Pending</span>
    <span class="tag" style="background:#FEEEED;color:#ED4178">Failed</span>
    <span class="tag lime">New</span>
    <span class="tag pill" style="background:#F3F4F7;color:#57585C">Spot</span>
    <span class="tag pill" style="background:#0B0C0E;color:#fff">10×</span>
  </div>
  <div class="row">
    <span class="tag dot" style="color:#00AB6C">Connected</span>
    <span class="num">3</span>
    <span class="num">99+</span>
  </div>
</body></html>
