<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--bg-base);padding:22px;box-sizing:border-box;color:var(--fg-1)}
  .lead{font-size:11px;color:var(--fg-3);font-family:var(--font-mono);margin-bottom:12px}
  table{width:100%;border-collapse:collapse}
  td{padding:7px 0;border-bottom:1px solid var(--divider-1)}
  .pair{font-weight:600}
  .px{text-align:right}
  .num{font-family:var(--font-num);font-variant-numeric:tabular-nums;font-weight:600;font-size:16px}
  .up{color:#00AB6C}.dn{color:#ED4178}
  .pct{font-family:var(--font-num);font-variant-numeric:tabular-nums;font-size:13px;text-align:right}
</style></head>
<body>
  <div class="lead">Switzer · tabular-nums — prices align in columns</div>
  <table>
    <tr><td class="pair">BTC/USDT</td><td class="px"><span class="num">64,182.50</span></td><td class="pct up">+2.34%</td></tr>
    <tr><td class="pair">ETH/USDT</td><td class="px"><span class="num">3,418.07</span></td><td class="pct up">+1.02%</td></tr>
    <tr><td class="pair">SOL/USDT</td><td class="px"><span class="num">148.96</span></td><td class="pct dn">−3.71%</td></tr>
    <tr><td class="pair">DOGE/USDT</td><td class="px"><span class="num">0.16240</span></td><td class="pct dn">−0.58%</td></tr>
  </table>
</body></html>
