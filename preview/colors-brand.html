<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-ui);background:var(--bg-base);padding:20px;box-sizing:border-box}
  .row{display:flex;gap:10px}
  .sw{flex:1;border-radius:10px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border:1px solid var(--border-primary)}
  .sw .n{font-size:12px;font-weight:600;font-family:var(--font-num)}
  .sw .h{font-size:10px;opacity:.7;font-family:var(--font-mono)}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#FEF4E6;color:#7C2D12"><span class="n">brand/1</span><span class="h">#FEF4E6</span></div>
    <div class="sw" style="background:#F7AA37;color:#311E01"><span class="n">brand/5</span><span class="h">#F7AA37</span></div>
    <div class="sw" style="background:#F59505;color:#311E01"><span class="n">brand/6 ★</span><span class="h">#F59505</span></div>
    <div class="sw" style="background:#DC8605;color:#fff"><span class="n">brand/press</span><span class="h">#DC8605</span></div>
    <div class="sw" style="background:#311E01;color:#F7AA37"><span class="n">brand/11</span><span class="h">#311E01</span></div>
  </div>
</body></html>
