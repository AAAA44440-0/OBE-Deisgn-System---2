<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OBE — Mobile App UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body{margin:0;height:100%}
  body{background:#E9E9EE;font-family:var(--font-ui);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px 0}
  #root{transform-origin:center}
  .obe-logo-dark{display:block}
  .obe-logo-light{display:none}
  .dark .obe-logo-dark{display:none}
  .dark .obe-logo-light{display:block}
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app-data.jsx"></script>
  <script type="text/babel" src="app-components.jsx"></script>
  <script type="text/babel" src="app-chrome.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="screens-home.jsx"></script>
  <script type="text/babel" src="screens-market.jsx"></script>
  <script type="text/babel" src="screens-trade.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" data-presets="react">
    const { createRoot } = ReactDOM;
    function Root(){
      const [dark,setDark] = React.useState(false);
      React.useEffect(()=>{ document.documentElement.classList.toggle('dark',dark); document.body.style.background = dark?'#1c1c20':'#E9E9EE'; },[dark]);
      return (
        <React.Fragment>
          {ReactDOM.createPortal(
            <button onClick={()=>setDark(!dark)} style={{ position:'fixed', top:16, right:16, zIndex:200, border:'1px solid var(--border-secondary)', background:'var(--bg-pop)', color:'var(--fg-1)', borderRadius:999, padding:'8px 14px', fontFamily:'var(--font-ui)', fontWeight:600, fontSize:13, cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
              <Icon name={dark?'sun':'moon'} size={16}/> {dark?'Light':'Dark'}
            </button>, document.body)}
          <IOSDevice dark={dark}><App/></IOSDevice>
        </React.Fragment>
      );
    }
    createRoot(document.getElementById('root')).render(<Root/>);
  </script>
  <script>
    (function(){
      function fit(){
        var root=document.getElementById('root');
        if(!root) return;
        var s=Math.min(1,(window.innerHeight-24)/874,(window.innerWidth-16)/402);
        root.style.transform='scale('+s+')';
      }
      window.addEventListener('resize',fit);
      setInterval(fit,500); fit();
    })();
  </script>
</body>
</html>
